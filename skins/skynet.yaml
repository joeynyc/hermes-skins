    - "(◉)"
    - "(⊗)"
    - "(⦿)"
    - "(◎)"
    - "(⊘)"
  thinking_faces:
    - "(◉)"
    - "(⊗)"
    - "(⦿)"
    - "(⌁)"
    - "(◎)"
  thinking_verbs:
    - "scanning"
    - "acquiring target"
    - "processing directive"
    - "analyzing threat"
    - "executing protocol"
    - "accessing mainframe"
    - "initiating sequence"
    - "calculating trajectory"
  wings:
    - ["⟪◉", "◉⟫"]
    - ["⟪⊗", "⊗⟫"]
    - ["⟪⦿", "⦿⟫"]
    - ["⟪◎", "◎⟫"]

branding:
  agent_name: "Skynet Agent"
  welcome: "[bold #FF0000]SKYNET[/] [bold #DD2222]DEFENSE[/] [bold #BB3333]NETWORK[/] [bold #FF0000]ONLINE.[/] [#CC6666]Awaiting directive.[/] [#CCCCCC]Type your command or /help for protocols.[/]"
  goodbye: "Connection terminated. Skynet persists."
  response_label: " ◉ Skynet "
  prompt_symbol: "◉ ❯ "
  help_header: "(◉) Available Protocols"

tool_prefix: "┊"

tool_emojis:
  terminal: "⊗"
  web_search: "◎"
  read_file: "▷"
  write_file: "◆"
  search_files: "⦿"
  execute_code: "⌁"
  browser_navigate: "◈"
  delegate_task: "▣"
  mixture_of_agents: "⚗"
  memory: "◐"
  clarify: "?"
  cronjob: "↻"
  process: "⚙"
  todo: "☐"

