  session_border: "#45475a"   # Surface 1

spinner:
  waiting_faces:
    - "(=^.^=)"
    - "(=①ω①=)"
    - "(=^-ω-^=)"
    - "(=^◡^=)"
  thinking_faces:
    - "(=^.^=)"
    - "(=^ω^=)"
    - "(=^·^=)"
    - "(=^-^=)"
    - "(=◕ᴗ◕=)"
  thinking_verbs:
    - "brewing something warm"
    - "curling up with data"
    - "purring through tokens"
    - "napping on the context"
    - "kneading the response"
    - "chasing a trailing thought"
    - "stretching across layers"
    - "whisker-sensing patterns"
  wings:
    - ["⟪◈", "◈⟫"]
    - ["⟪●", "●⟫"]
    - ["⟪◆", "◆⟫"]
    - ["⟪⬡", "⬡⟫"]

