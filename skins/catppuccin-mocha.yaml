# Catppuccin Mocha — Soothing pastel theme for Hermes Agent
# https://github.com/catppuccin/catppuccin
# Palette: Mocha (darkest flavor)

name: catppuccin-mocha
description: Catppuccin Mocha — soothing pastel colors on a warm dark base, cozy terminal aesthetic

colors:
  banner_border: "#cba6f7"    # Mauve
  banner_title: "#b4befe"     # Lavender
  banner_accent: "#cba6f7"    # Mauve
  banner_dim: "#7f849c"       # Overlay 1
